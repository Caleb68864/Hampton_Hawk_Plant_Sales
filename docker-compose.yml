services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: plantapp
      POSTGRES_PASSWORD: plantapp
      POSTGRES_DB: hampton_hawks_plant_sales
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantapp -d hampton_hawks_plant_sales"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=hampton_hawks_plant_sales;Username=plantapp;Password=plantapp
      APP_ADMIN_PIN: "1234"
      INVENTORY_NEGATIVE_ADJUST_THRESHOLD: "10"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "0.0.0.0:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: ./web
    depends_on:
      - api
    ports:
      - "0.0.0.0:3000:80"

volumes:
  postgres_data:
